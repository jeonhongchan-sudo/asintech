name: Auto Vector Embedding (Local Engine)

on:
  schedule:
    # 한국 시간(KST) 새벽 3시는 UTC 기준 18:00입니다.
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests supabase sentence-transformers torch postgrest --no-cache-dir

      - name: Run Embedding Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        # 경로에 공백/괄호가 있으므로 큰따옴표로 감싸서 실행합니다.
        run: python "asintech(Github_Action, 배포 폴더)/auto_embed.py"