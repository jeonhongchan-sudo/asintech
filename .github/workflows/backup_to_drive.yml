name: Backup Photos to Google Drive

on:
  repository_dispatch:
    types: [backup_to_drive]

jobs:
  backup:
    runs-on: ubuntu-22.04 # Ubuntu 버전을 명시적으로 고정
    
    # [NEW] 미리 빌드된 도커 컨테이너 환경에서 즉시 실행
    container:
      image: ghcr.io/${{ github.repository_owner }}/asintech-backup-env:latest

    # [핵심] 사용자가 연사로 사진을 찍어도 작업이 꼬이지 않도록 
    # 동일 프로젝트의 백업은 순차적으로(Queueing) 실행합니다.
    concurrency:
      group: backup-${{ github.event.client_payload.project_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Backup Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          python backup_to_drive.py