name: Backup Photos to Google Drive

on:
  repository_dispatch:
    types: [backup_to_drive]

jobs:
  backup:
    runs-on: ubuntu-latest
    # [핵심] 사용자가 연사로 사진을 찍어도 작업이 꼬이지 않도록 
    # 동일 프로젝트의 백업은 순차적으로(Queueing) 실행합니다.
    concurrency:
      group: backup-${{ github.event.client_payload.project_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Backup Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: |
          python backup_to_drive.py