name: Convert CAD to PMTiles

on:
  repository_dispatch:
    types: [convert_cad]  # 외부(GAS 등)에서 이 신호를 보내면 실행됨

jobs:
  convert-and-upload:
    runs-on: ubuntu-22.04

    # [NEW] 미리 빌드된 컨버터 전용 이미지 사용
    container:
      image: ghcr.io/${{ github.repository_owner }}/asintech-converter-env:latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Conversion Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      run: |
        # client_payload 전체를 JSON 문자열로 전달
        python convert_r2.py '${{ toJson(github.event.client_payload) }}'
