name: Analyze CAD Layers
on:
  repository_dispatch:
    types: [analyze_cad]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip' # Python 패키지 캐싱 활성화

      - name: Install Dependencies
        run: |
          pip install ezdxf boto3 supabase requests

      - name: Cache ODA Debian Package
        if: endsWith(github.event.client_payload.file_name, '.dwg')
        id: cache-oda-deb
        uses: actions/cache@v3
        with:
          path: ODAFileConverter_QT5_lnxX64_7.2b_23.11.deb
          key: ${{ runner.os }}-oda-deb-7.2b

      - name: Install ODA File Converter (for DWG)
        if: endsWith(github.event.client_payload.file_name, '.dwg')
        run: |
          sudo apt-get update
          # 존재하지 않는 패키지 대신 표준 그래픽 라이브러리 및 xvfb 설치
          sudo apt-get install -y libgl1 libx11-6 libxcb1 libxrender1 libxi6 libsm6 libice6 libxext6 xvfb
          
          # 캐시된 deb 파일이 없는 경우에만 다운로드
          if [ ! -f "ODAFileConverter_QT5_lnxX64_7.2b_23.11.deb" ]; then
            wget -q https://download.opendesign.com/guestfiles/ODAFileConverter/ODAFileConverter_QT5_lnxX64_7.2b_23.11.deb
          fi
          
          # dpkg 설치 시도 후 부족한 종속성은 apt-get install -f로 자동 해결
          sudo dpkg -i ODAFileConverter_QT5_lnxX64_7.2b_23.11.deb || sudo apt-get install -f -y

      - name: Run Analysis Script
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # ODA Converter가 설치된 경로를 환경변수로 추가
          ODA_PATH: "/usr/local/bin/ODAFileConverter"
        run: |
          # client_payload를 JSON 문자열로 안전하게 전달
          python analyze_cad.py '${{ toJSON(github.event.client_payload) }}'